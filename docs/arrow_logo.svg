<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-label="Arrow — AutoResearch Overwatch">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0F1E"/>
      <stop offset="1" stop-color="#0E1A33"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="0.55" stop-color="#F97316"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1B2542"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="1188" height="468" rx="30" fill="url(#bg)" stroke="#22304F" stroke-width="2"/>
  <rect x="6" y="6" width="1188" height="468" rx="30" fill="url(#dots)" opacity="0.55"/>

  <!-- emblem: overwatch radar + research graph + arrow -->
  <g transform="translate(250,240)">
    <circle r="175" fill="url(#halo)"/>
    <!-- radar rings -->
    <circle r="152" fill="none" stroke="#263457" stroke-width="2" stroke-dasharray="3 9"/>
    <circle r="116" fill="none" stroke="#22304F" stroke-width="2"/>
    <circle r="80" fill="none" stroke="#1E2A49" stroke-width="2"/>
    <!-- radar ticks -->
    <g stroke="#31416B" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-152" x2="0" y2="-141"/>
      <line x1="0" y1="-152" x2="0" y2="-141" transform="rotate(30)"/>
      <line x1="0" y1="-152" x2="0" y2="-141" transform="rotate(60)"/>
      <line x1="0" y1="-152" x2="0" y2="-141" transform="rotate(90)"/>
      <line x1="0" y1="-152" x2="0" y2="-141" transform="rotate(120)"/>
      <line x1="0" y1="-152" x2="0" y2="-141" transform="rotate(150)"/>
      <line x1="0" y1="-152" x2="0" y2="-141" transform="rotate(180)"/>
      <line x1="0" y1="-152" x2="0" y2="-141" transform="rotate(210)"/>
      <line x1="0" y1="-152" x2="0" y2="-141" transform="rotate(240)"/>
      <line x1="0" y1="-152" x2="0" y2="-141" transform="rotate(270)"/>
      <line x1="0" y1="-152" x2="0" y2="-141" transform="rotate(300)"/>
      <line x1="0" y1="-152" x2="0" y2="-141" transform="rotate(330)"/>
    </g>
    <!-- research graph edges -->
    <g stroke="#3B82F6" stroke-width="2.5" opacity="0.55">
      <line x1="0" y1="-110" x2="-80" y2="-20"/>
      <line x1="0" y1="-110" x2="80" y2="-20"/>
      <line x1="-80" y1="-20" x2="-50" y2="80"/>
      <line x1="80" y1="-20" x2="50" y2="80"/>
      <line x1="-80" y1="-20" x2="50" y2="80"/>
    </g>
    <!-- metered back-edge (we don't remove loops; we meter them) -->
    <path d="M 50 80 C 122 60, 126 18, 80 -20" fill="none" stroke="#F59E0B"
          stroke-width="2.5" stroke-dasharray="6 6" opacity="0.65"/>
    <!-- graph nodes -->
    <g fill="#0B1020" stroke-width="3">
      <circle cx="0" cy="-110" r="10" stroke="#F8FAFC"/>
      <circle cx="-80" cy="-20" r="10" stroke="#38BDF8"/>
      <circle cx="80" cy="-20" r="10" stroke="#38BDF8"/>
      <circle cx="-50" cy="80" r="10" stroke="#38BDF8"/>
      <circle cx="50" cy="80" r="13" stroke="#F59E0B"/>
    </g>
    <!-- the arrow -->
    <g filter="url(#glow)">
      <path d="M -142 108 C -80 62, -38 24, 2 -2 C 44 -30, 90 -66, 146 -106"
            fill="none" stroke="url(#arrow)" stroke-width="13" stroke-linecap="round"/>
      <polygon points="146,-106 131,-73 113,-91" fill="url(#arrow)"/>
      <circle cx="-142" cy="108" r="7" fill="#FBBF24"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="470" y="212" font-family="Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="92" font-weight="800" letter-spacing="14" fill="#F8FAFC">ARROW</text>
  <rect x="474" y="238" width="430" height="6" rx="3" fill="url(#bar)"/>
  <text x="472" y="292" font-family="Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="30" font-weight="700" letter-spacing="10.5" fill="#F59E0B">AUTORESEARCH OVERWATCH</text>
  <text x="472" y="340" font-family="Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="21" font-style="italic" fill="#8CA0BF">Don't trust what the agent says — watch the world-state.</text>
</svg>
